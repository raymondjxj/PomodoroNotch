name: Build DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --arch arm64

      - name: Create .app bundle
        run: |
          mkdir -p .build/release/PomodoroNotch.app/Contents/MacOS
          mkdir -p .build/release/PomodoroNotch.app/Contents/Resources
          cp .build/release/PomodoroNotch .build/release/PomodoroNotch.app/Contents/MacOS/

          # Copy icon
          cp Assets/AppIcon.icns .build/release/PomodoroNotch.app/Contents/Resources/

          cat > .build/release/PomodoroNotch.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>PomodoroNotch</string>
              <key>CFBundleIdentifier</key>
              <string>com.pomodoro.notch</string>
              <key>CFBundleName</key>
              <string>番茄时钟</string>
              <key>CFBundleDisplayName</key>
              <string>番茄时钟</string>
              <key>CFBundleVersion</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc sign app
        run: codesign --force --sign - .build/release/PomodoroNotch.app

      - name: Create DMG
        run: |
          mkdir -p staging
          cp -R .build/release/PomodoroNotch.app staging/
          ln -s /Applications staging/Applications
          hdiutil create -volname "PomodoroNotch" -srcfolder staging -ov -format UDZO -fs HFS+ -size 10m PomodoroNotch.dmg
          hdiutil attach PomodoroNotch.dmg -nobrowse -noautoopen
          MOUNT=$(ls -d /Volumes/PomodoroNotch* | head -1)
          osascript -e 'tell application "Finder"
            tell disk "'$(basename "$MOUNT")'"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {400, 200, 900, 560}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 80
              set position of item "PomodoroNotch.app" to {120, 140}
              set position of item "Applications" to {380, 140}
              close
              open
            end tell
          end tell'
          sleep 2
          hdiutil detach "$MOUNT" -force
          codesign --force --sign - PomodoroNotch.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PomodoroNotch-${{ github.ref_name }}
          path: PomodoroNotch.dmg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@PomodoroNotch.dmg" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=PomodoroNotch.dmg"
          echo "DMG attached to release"
